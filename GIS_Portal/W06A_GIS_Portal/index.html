<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彰化縣環保人員氣候風險套疊決策支援系統</title>
    <meta name="description" content="彰化縣環保清潔設施氣候風險套疊系統，結合淹水與高溫氣候模擬，評估清潔隊部與資源回收場之環保工作人員曝險情況。">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- FontAwesome for premium icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <script>
        (function(){
            function getStoredTheme() {
                try {
                    const theme = window.localStorage.getItem('cool-color-theme');
                    return theme === 'light' || theme === 'dark' ? theme : null;
                } catch (error) {
                    return null;
                }
            }
            document.documentElement.dataset.colorTheme = getStoredTheme() || 'dark';
        })();
    </script>

    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="style.css?v=2.0.0">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Dashboard -->
        <aside class="sidebar">
            <div class="brand">
                <i class="fa-solid fa-recycle logo-icon"></i>
                <div class="brand-text">
                    <h1>彰化縣 GIS 氣候調適</h1>
                    <span class="sub">環保設施氣候風險套疊分析</span>
                </div>
                <div class="mobile-toggle-arrow">
                    <i class="fa-solid fa-chevron-down" id="mobile-toggle-icon"></i>
                </div>
            </div>

            <div style="padding: 0 16px 12px 16px; border-bottom: 1px solid var(--subtle-divider); margin-bottom: 10px;">
                <a href="../index.html" style="color: var(--text-secondary); text-decoration: none; font-size: 0.8rem; display: flex; align-items: center; gap: 6px; transition: color 0.2s;" onmouseover="this.style.color='var(--primary)';" onmouseout="this.style.color='var(--text-secondary)';">
                    <i class="fa-solid fa-arrow-left"></i> 返回「C.O.O.L. 彰化」成果展示大廳
                </a>
            </div>

            <!-- Color Theme Control -->
            <section class="control-section theme-control-section">
                <h3 class="section-title"><i class="fa-solid fa-palette"></i> 色彩佈景主題</h3>
                <label class="group-label" for="color-theme-select">選擇顯示配色</label>
                <select id="color-theme-select" class="theme-select" aria-label="選擇色彩佈景主題">
                    <option value="dark">深色展示</option>
                    <option value="light">亮色閱讀</option>
                </select>
            </section>

            <!-- Statistical Cards -->
            <section class="stats-section">
                <div class="stat-card total-centers">
                    <div class="stat-icon"><i class="fa-solid fa-recycle" id="stat-icon-total"></i></div>
                    <div class="stat-info">
                        <span class="stat-label" id="stat-label-total">環保設施總數</span>
                        <span class="stat-value" id="val-total-centers">--</span>
                    </div>
                </div>
                <div class="stat-card high-risk-centers">
                    <div class="stat-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
                    <div class="stat-info">
                        <span class="stat-label" id="stat-label-highrisk">第 4-5 級警戒設施</span>
                        <span class="stat-value" id="val-high-risk">--</span>
                    </div>
                </div>
            </section>

            <!-- Point Layer Theme Switcher -->
            <section class="control-section">
                <h3 class="section-title"><i class="fa-solid fa-layer-group"></i> 套疊點位主題</h3>
                <div class="control-group">
                    <div class="toggle-buttons" id="point-theme-selector">
                        <button class="toggle-btn" data-point-theme="daycare" id="btn-pt-daycare">
                            <i class="fa-solid fa-house-chimney-medical"></i> 日照機構
                        </button>
                        <button class="toggle-btn active" data-point-theme="env_hq" id="btn-pt-env-hq">
                            <i class="fa-solid fa-truck"></i> 清潔隊部
                        </button>
                        <button class="toggle-btn" data-point-theme="env_rec" id="btn-pt-env-rec">
                            <i class="fa-solid fa-recycle"></i> 資源回收場
                        </button>
                        <button class="toggle-btn" data-point-theme="env_all" id="btn-pt-env-all">
                            <i class="fa-solid fa-map-pin"></i> 全部設施
                        </button>
                    </div>
                </div>
            </section>

            <!-- Map Control Layer Switcher -->
            <section class="control-section">
                <h3 class="section-title"><i class="fa-solid fa-sliders"></i> 氣候風險底圖</h3>

                <div class="control-group">
                    <label class="group-label">分析主題</label>
                    <div class="toggle-buttons" id="theme-selector">
                        <button class="toggle-btn active" data-theme="flood">
                            <i class="fa-solid fa-cloud-showers-heavy"></i> 淹水災害
                        </button>
                        <button class="toggle-btn" data-theme="temp">
                            <i class="fa-solid fa-temperature-arrow-up"></i> 高溫風險
                        </button>
                    </div>
                </div>

                <div class="control-group" id="flood-mode-group">
                    <label class="group-label">淹水圖資套疊（可複選）</label>
                    <div class="toggle-buttons" id="flood-mode-selector">
                        <button class="toggle-btn active" data-mode="ncdr">
                            <i class="fa-solid fa-map"></i> NCDR 鄉鎮風險
                        </button>
                        <button class="toggle-btn" data-mode="wra">
                            <i class="fa-solid fa-water"></i> 水利署潛勢圖
                        </button>
                    </div>
                </div>

                <div class="control-group" id="temp-mode-group" style="display: none;">
                    <label class="group-label">高溫風險計算模式</label>
                    <div class="toggle-buttons" id="temp-mode-selector">
                        <button class="toggle-btn active" data-mode="mean">
                            <i class="fa-solid fa-calculator"></i> 均權平均風險
                        </button>
                        <button class="toggle-btn" data-mode="max">
                            <i class="fa-solid fa-triangle-exclamation"></i> 最大值風險
                        </button>
                    </div>
                </div>

                <div class="control-group" id="risk-opacity-group">
                    <label class="group-label opacity-control-label" for="slider-risk-opacity">
                        <span id="risk-opacity-label">NCDR 風險圖透明度</span>
                        <span id="val-risk-opacity">70%</span>
                    </label>
                    <input type="range" id="slider-risk-opacity" class="control-range" min="0.1" max="1" step="0.05" value="0.7" aria-label="風險圖透明度">
                </div>

                <div class="control-group">
                    <label class="group-label">氣候情境時間軸</label>
                    <div class="timeline" id="scenario-selector">
                        <div class="timeline-track"></div>
                        <div class="timeline-step active" data-scenario="current" style="left: 0%;">
                            <span class="step-dot"></span>
                            <span class="step-label">現況基準(Baseline) </span>
                        </div>
                        <div class="timeline-step" data-scenario="future" style="left: 100%;">
                            <span class="step-dot"></span>
                            <span class="step-label">世紀末升溫 1.5°C 情境</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Chart Section -->
            <section class="chart-section">
                <h3 class="section-title"><i class="fa-solid fa-chart-simple"></i> 風險等級分佈統計</h3>
                <div class="chart-container">
                    <canvas id="riskChart"></canvas>
                </div>
            </section>

            <!-- Facility List -->
            <section class="daycare-list-section">
                <h3 class="section-title"><i class="fa-solid fa-list-check"></i> <span id="list-section-title">本區環保設施列表</span> <span id="town-selected-name">(全縣)</span></h3>
                <div class="daycare-list" id="daycare-list-container">
                    <p class="list-placeholder">請點選地圖行政區，查看該區設施...</p>
                </div>
            </section>

            <!-- Calibration Panel -->
            <section class="chart-section calibration-widget" id="calibration-widget">
                <input type="checkbox" id="toggle-calibration" class="calibration-toggle" aria-controls="calibration-panel">
                <label class="section-title calibration-toggle-label" for="toggle-calibration">
                    <span class="calibration-toggle-title"><i class="fa-solid fa-compass"></i> 開發者圖資校正工具</span>
                    <span class="calibration-toggle-hint"><i class="fa-solid fa-chevron-down"></i></span>
                </label>
                <div class="calibration-panel" id="calibration-panel">
                    <div class="control-group calibration-control">
                        <label class="calibration-control-label">
                            經度偏移 (Lon Shift): <span id="val-lon-shift" class="calibration-value">0.00000</span>
                        </label>
                        <input type="range" id="slider-lon-shift" class="calibration-range" min="-0.04" max="0.04" step="0.0001" value="0.0">
                    </div>
                    <div class="control-group calibration-control">
                        <label class="calibration-control-label">
                            緯度偏移 (Lat Shift): <span id="val-lat-shift" class="calibration-value">0.00000</span>
                        </label>
                        <input type="range" id="slider-lat-shift" class="calibration-range" min="-0.04" max="0.04" step="0.0001" value="0.0">
                    </div>
                    <div class="control-group calibration-control">
                        <label class="calibration-control-label">
                            縮放比例 (Scale): <span id="val-scale" class="calibration-value">1.00000</span>
                        </label>
                        <input type="range" id="slider-scale" class="calibration-range" min="0.95" max="1.05" step="0.0001" value="1.0">
                    </div>
                    <div class="calibration-help">
                        拖曳滑桿即時平移地圖邊界。<br>
                        <strong>請協助尋找讓邊界與道路底圖最契合之數值。</strong>
                    </div>
                </div>
            </section>
        </aside>

        <!-- Main Map Area -->
        <main class="map-wrapper">
            <div id="map"></div>

            <!-- Map Info Widget -->
            <div class="map-info-widget" id="info-widget">
                <h4><i class="fa-solid fa-location-crosshairs"></i> 滑鼠懸停行政區資訊</h4>
                <div id="info-content">
                    <p class="placeholder">懸停於行政區上以載入氣候風險指標...</p>
                </div>
            </div>

            <!-- Overlay Header -->
            <header class="map-overlay-header">
                <div class="header-pill">
                    <span class="indicator-dot active"></span>
                    <span class="header-title" id="active-scenario-indicator">淹水風險等級套疊 - 現況基準</span>
                </div>
            </header>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- App JS -->
    <script src="app.js?v=4"></script>
</body>
</html>
